<h1>CS61A: 计算机程序的构造与解释</h1>

<ng-container *ngIf="this.key == null">
    <table mat-table [dataSource]="indexData">

        <ng-container matColumnDef="lecture">
            <th mat-header-cell *matHeaderCellDef>课程</th>
            <td mat-cell *matCellDef="let element">
                <a href="?type=lecture&key={{element.lecture}}">{{element.lecture}}</a>
            </td>
        </ng-container>

        <ng-container matColumnDef="book">
            <th mat-header-cell *matHeaderCellDef>教材</th>
            <td mat-cell *matCellDef="let element">
                <a href="?type=book&key={{element.book}}">{{element.book}}</a>
            </td>
        </ng-container>

        <ng-container matColumnDef="lab">
            <th mat-header-cell *matHeaderCellDef>实验</th>
            <td mat-cell *matCellDef="let element">
                <a href="?type=lab&key={{element.lab}}">{{element.lab}}</a>
            </td>
        </ng-container>

        <ng-container matColumnDef="work">
            <th mat-header-cell *matHeaderCellDef>作业</th>
            <td mat-cell *matCellDef="let element">
                <a href="?type=work&key={{element.work}}">{{element.work}}</a>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="indexColumn"></tr>
        <tr mat-row *matRowDef="let row; columns: indexColumn;"></tr>
    </table>
</ng-container>

<ng-container *ngIf="this.key != null">
    <button mat-stroked-button (click)="resetParam()">返回</button>

    <p>doc {{key}} works!</p>

    <markdown [data]="document"></markdown>
</ng-container>

<p>最后更新：2025 年 2 月 1 日</p>
